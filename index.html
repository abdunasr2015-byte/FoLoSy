<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLoSy Ultimate - نصر ورحيم</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37;
            --success: #28a745; --danger: #dc3545;
        }
        body.theme-gold { --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37; --is-emoji: none; --is-serious: block; }
        body.theme-green { --bg: #064e3b; --card: rgba(255,255,255,0.05); --text: #fff; --accent: #34d399; --is-emoji: block; --is-serious: none; }
        body.theme-pink { --bg: #fff1f2; --card: #ffffff; --text: #881337; --accent: #fb7185; --is-emoji: block; --is-serious: none; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; text-align: center; transition: 0.5s;
        }

        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 1px solid var(--accent); backdrop-filter: blur(10px);
        }

        .emoji-view { display: var(--is-emoji); }
        .serious-view { display: var(--is-serious); font-weight: bold; font-size: 14px; }

        .balance-value { font-size: 40px; font-weight: 800; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { border: 1px solid var(--accent); padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.2); }

        input, select {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--accent); font-size: 16px;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; width: 100%; background: var(--accent); }

        .mic-btn {
            background: var(--accent); width: 70px; height: 70px; border-radius: 50%; 
            margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 30px;
            border: 2px solid #fff; color: white; cursor: pointer;
        }
        .mic-active { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .mood-btn { font-size: 24px; cursor: pointer; padding: 10px; border-radius: 12px; border: 1px solid transparent; flex: 1; transition: 0.3s; }
        .mood-btn.selected { border-color: var(--accent); background: rgba(212,175,55,0.2); transform: scale(1.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(212,175,55,0.2); font-size: 12px; }

        .settings-panel { display: none; text-align: right; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); margin-bottom: 15px; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
        .ltr { direction: ltr; text-align: left; }
        
        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; } }
    </style>
</head>
<body id="mainBody" class="theme-gold">

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div class="glass-card" style="width:300px;">
            <h2 id="l_lockTitle">FoLoSy Secure 🔒</h2>
            <input type="password" id="pinCode" maxlength="4" placeholder="****" inputmode="numeric" oninput="checkPinAuto()" style="text-align:center; letter-spacing:10px; font-size:30px;">
            <p id="lockMsg" style="color:var(--danger); font-size:12px;"></p>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <button onclick="toggleSettings()" style="background:none; border:none; font-size:26px; cursor:pointer; color:var(--accent);">⚙️</button>
            <h2 id="l_mainTitle" style="margin:0;">FoLoSy</h2>
            <button onclick="window.print()" style="background:none; border:none; font-size:24px; cursor:pointer;">🖨️</button>
        </div>

        <div id="settingsPanel" class="settings-panel no-print">
            <label id="l_langLabel">اللغة:</label>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
            <label id="l_themeLabel" style="display:block; margin-top:15px;">المظهر:</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="theme-gold">فخامة (Black Gold)</option>
                <option value="theme-green">طبيعة (Green - رحيم)</option>
                <option value="theme-pink">بناتي (Pink)</option>
            </select>
            <button class="btn" style="background:var(--danger); margin-top:20px;" onclick="clearAllData()">مسح البيانات</button>
        </div>

        <div class="glass-card">
            <div id="l_balanceLabel" style="opacity:0.8; font-size:14px;">الرصيد المتاح</div>
            <div id="liveBalance" class="balance-value">0.00</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div style="color:var(--success); font-size:11px;" id="l_inc">إجمالي الإيرادات</div>
                    <div id="totalIncome" style="font-weight:bold; font-size:16px;">0</div>
                </div>
                <div class="stat-box">
                    <div style="color:var(--danger); font-size:11px;" id="l_exp">إجمالي المصروفات</div>
                    <div id="totalExpenses" style="font-weight:bold; font-size:16px;">0</div>
                </div>
            </div>
        </div>

        <div class="no-print">
            <button class="mic-btn" id="micBtn" onclick="startVoice()">🎙️</button>
            <div id="l_micHint" style="font-size:11px; margin-bottom:15px; color:var(--accent);"></div>

            <div class="glass-card">
                <input type="text" id="description" placeholder="البيان">
                <input type="number" id="amount" placeholder="المبلغ">
                <select id="type">
                    <option value="expense" id="l_optExp">صرف (-)</option>
                    <option value="income" id="l_optInc">دخل (+)</option>
                </select>
                <div style="display:flex; gap:5px; margin:10px 0;">
                    <div class="mood-btn selected" id="m1" onclick="selectMood('😊', 'm1')">
                        <span class="emoji-view">😊</span><span class="serious-view" id="l_s1">عادي</span>
                    </div>
                    <div class="mood-btn" id="m2" onclick="selectMood('😎', 'm2')">
                        <span class="emoji-view">😎</span><span class="serious-view" id="l_s2">استثمار</span>
                    </div>
                    <div class="mood-btn" id="m3" onclick="selectMood('😢', 'm3')">
                        <span class="emoji-view">😢</span><span class="serious-view" id="l_s3">ضروري</span>
                    </div>
                    <div class="mood-btn" id="m4" onclick="selectMood('😡', 'm4')">
                        <span class="emoji-view">😡</span><span class="serious-view" id="l_s4">طوارئ</span>
                    </div>
                </div>
                <button id="l_addBtn" class="btn" onclick="addEntry()">حفظ العملية</button>
            </div>
        </div>

        <table>
            <thead>
                <tr style="color:var(--accent)">
                    <th id="l_th1">التاريخ</th>
                    <th id="l_th2">البيان</th>
                    <th id="l_th3">المبلغ</th>
                    <th class="no-print">⚙️</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('rahim_final_v3') || "[]");
        let savedPin = localStorage.getItem('rahim_pin') || "1234";
        let currentLang = localStorage.getItem('rahim_lang') || 'ar';
        let currentTheme = localStorage.getItem('rahim_theme') || 'theme-gold';
        let currentMood = '😊', editIndex = -1;

        const i18n = {
            ar: {
                lockTitle: "الرمز السري", mainTitle: "حسابات رحيم", settings: "الإعدادات",
                langLabel: "اللغة:", themeLabel: "المظهر:", balanceLabel: "إجمالي الرصيد المتاح",
                inc: "إجمالي الإيرادات", exp: "إجمالي المصروفات", micHint: "اضغط واتكلم (جالي 50 جنيه)",
                optExp: "صرف (-)", optInc: "دخل (+)", addBtn: "حفظ العملية", updateBtn: "تحديث العملية",
                s1: "عادي", s2: "استثمار", s3: "ضروري", s4: "طوارئ", th1:"التاريخ", th2:"البيان", th3:"المبلغ"
            },
            en: {
                lockTitle: "Security Pin", mainTitle: "Rahim Wallet", settings: "Settings",
                langLabel: "Language:", themeLabel: "Theme:", balanceLabel: "Total Available Balance",
                inc: "Total Income", exp: "Total Expenses", micHint: "Tap to Speak (I got 100 bucks)",
                optExp: "Expense (-)", optInc: "Income (+)", addBtn: "Save Entry", updateBtn: "Update Entry",
                s1: "Normal", s2: "Invest", s3: "Urgent", s4: "Emergency", th1:"Date", th2:"Desc", th3:"Amt"
            }
        };

        function applyLanguage() {
            const t = i18n[currentLang]; const isAr = currentLang === 'ar';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('appContent').className = isAr ? '' : 'ltr';
            document.getElementById('l_lockTitle').innerText = t.lockTitle;
            document.getElementById('l_mainTitle').innerText = t.mainTitle;
            document.getElementById('l_balanceLabel').innerText = t.balanceLabel;
            document.getElementById('l_inc').innerText = t.inc; document.getElementById('l_exp').innerText = t.exp;
            document.getElementById('l_micHint').innerText = t.micHint;
            document.getElementById('l_optExp').innerText = t.optExp; document.getElementById('l_optInc').innerText = t.optInc;
            document.getElementById('l_addBtn').innerText = (editIndex === -1) ? t.addBtn : t.updateBtn;
            document.getElementById('l_s1').innerText = t.s1; document.getElementById('l_s2').innerText = t.s2;
            document.getElementById('l_s3').innerText = t.s3; document.getElementById('l_s4').innerText = t.s4;
            document.getElementById('l_th1').innerText = t.th1; document.getElementById('l_th2').innerText = t.th2;
            document.getElementById('l_th3').innerText = t.th3;
            updateUI();
        }

        function updateUI() {
            const body = document.getElementById('tableBody'); body.innerHTML = "";
            let balance = 0, inc = 0, exp = 0;
            transactions.forEach((t, i) => {
                const amt = parseFloat(t.amount); const isInc = t.type === 'income';
                balance += isInc ? amt : -amt;
                if(isInc) inc += amt; else exp += amt;

                let statusInfo = `<span class="emoji-view">${t.mood}</span>`;
                if(currentTheme === 'theme-gold') {
                    const map = {'😊': i18n[currentLang].s1, '😎': i18n[currentLang].s2, '😢': i18n[currentLang].s3, '😡': i18n[currentLang].s4};
                    statusInfo = `<span class="serious-view" style="color:var(--accent)">${map[t.mood]}</span>`;
                }

                body.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td style="font-size:10px; opacity:0.6;">${t.date}</td>
                        <td style="font-weight:bold;">${statusInfo} ${t.desc}</td>
                        <td style="color:${isInc?'var(--success)':'var(--danger)'}; font-weight:900;">${amt}</td>
                        <td class="no-print">
                            <button onclick="editEntry(${i})" style="border:none; background:none; cursor:pointer;">📝</button>
                            <button onclick="deleteEntry(${i})" style="border:none; background:none; color:red; cursor:pointer;">✕</button>
                        </td>
                    </tr>
                `);
            });
            const balDiv = document.getElementById('liveBalance');
            balDiv.innerText = balance.toFixed(2);
            balDiv.style.color = balance >= 0 ? "var(--success)" : "var(--danger)";
            document.getElementById('totalIncome').innerText = inc.toFixed(2);
            document.getElementById('totalExpenses').innerText = exp.toFixed(2);
            localStorage.setItem('rahim_final_v3', JSON.stringify(transactions));
        }

        function addEntry() {
            const d = document.getElementById('description').value, a = document.getElementById('amount').value;
            if (!d || !a) return alert("Missing data");
            const entry = { desc: d, amount: a, type: document.getElementById('type').value, mood: currentMood, date: new Date().toLocaleDateString() };
            if(editIndex > -1) { transactions[editIndex] = entry; editIndex = -1; }
            else { transactions.push(entry); }
            document.getElementById('description').value = ""; document.getElementById('amount').value = "";
            applyLanguage();
        }

        function editEntry(i) {
            const t = transactions[i];
            document.getElementById('description').value = t.desc;
            document.getElementById('amount').value = t.amount;
            document.getElementById('type').value = t.type;
            editIndex = i;
            applyLanguage();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function checkPinAuto() { if(document.getElementById('pinCode').value === savedPin) { document.getElementById('lockScreen').style.display='none'; document.getElementById('appContent').style.display='block'; applyLanguage(); } }
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition(); rec.lang = currentLang==='ar'?'ar-EG':'en-US';
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase(); document.getElementById('description').value = text;
                const num = text.match(/\d+/); if(num) document.getElementById('amount').value = num[0];
                const incW = ["جالي", "أخدت", "دخل", "got", "received", "income"];
                document.getElementById('type').value = incW.some(w => text.includes(w)) ? "income" : "expense";
                document.getElementById('micBtn').classList.remove('mic-active');
            }; rec.start();
        }
        function changeTheme() { currentTheme = document.getElementById('themeSelect').value; document.body.className = currentTheme; localStorage.setItem('rahim_theme', currentTheme); updateUI(); }
        function changeLanguage() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('rahim_lang', currentLang); applyLanguage(); }
        function selectMood(m, id) { currentMood = m; document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected')); document.getElementById(id).classList.add('selected'); }
        function deleteEntry(i) { if(confirm("حذف؟")) { transactions.splice(i, 1); updateUI(); } }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function clearAllData() { if(confirm("حذف الكل؟")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
