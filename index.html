<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLoSy Multi-Style</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37;
            --success: #28a745; --danger: #dc3545; --gold: #d4af37;
        }
        /* تعريف الثيمات المختلفة */
        body.theme-gold { --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37; --is-emoji: none; --is-serious: block; }
        body.theme-green { --bg: #064e3b; --card: rgba(255,255,255,0.05); --text: #fff; --accent: #34d399; --is-emoji: block; --is-serious: none; }
        body.theme-pink { --bg: #fff1f2; --card: #ffffff; --text: #881337; --accent: #fb7185; --is-emoji: block; --is-serious: none; }
        body.theme-blue { --bg: #f0f9ff; --card: #ffffff; --text: #0c4a6e; --accent: #0ea5e9; --is-emoji: block; --is-serious: none; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; text-align: center; transition: 0.5s;
        }

        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 1px solid var(--accent); backdrop-filter: blur(10px);
        }

        /* التحكم في رؤية الإيموجي أو الكلمات الرسمية */
        .emoji-view { display: var(--is-emoji); }
        .serious-view { display: var(--is-serious); font-weight: bold; font-size: 14px; }

        .balance-value { font-size: 40px; font-weight: 800; margin: 10px 0; color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { border: 1px solid var(--accent); padding: 10px; border-radius: 12px; }

        input, select {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--accent); font-size: 16px;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; width: 100%; background: var(--accent); }

        .mic-btn {
            background: var(--accent); width: 70px; height: 70px; border-radius: 50%; 
            margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 30px;
            border: 2px solid #fff; color: white; cursor: pointer;
        }
        .mic-active { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .mood-btn { font-size: 24px; cursor: pointer; padding: 10px; border-radius: 12px; border: 1px solid transparent; flex: 1; }
        .mood-btn.selected { border-color: var(--accent); background: rgba(212,175,55,0.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--accent); font-size: 13px; }

        .settings-panel { display: none; text-align: right; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); }
        .active { display: block; }
        .ltr { direction: ltr; text-align: left; }
    </style>
</head>
<body id="mainBody" class="theme-gold">

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div class="glass-card" style="width:300px;">
            <h2 id="l_lockTitle">FoLoSy Secure 🔒</h2>
            <input type="password" id="pinCode" maxlength="4" placeholder="****" inputmode="numeric" oninput="checkPinAuto()" style="text-align:center; letter-spacing:10px; font-size:30px;">
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <button onclick="toggleSettings()" style="background:none; border:none; font-size:26px; cursor:pointer; color:var(--accent);">⚙️</button>
            <h2 id="l_mainTitle" style="margin:0;">FoLoSy</h2>
            <div style="width:26px"></div>
        </div>

        <div id="settingsPanel" class="settings-panel">
            <h3 id="l_settings">إعدادات النظام</h3>
            <label id="l_langLabel">اللغة / Language:</label>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="ar">العربية (رسمي/عامي)</option>
                <option value="en">English (Professional)</option>
            </select>

            <label id="l_themeLabel" style="display:block; margin-top:15px;">المظهر / Style:</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="theme-gold">فخامة (Black Gold - الرسمي)</option>
                <option value="theme-green">طبيعة (Green Nature - رحيم)</option>
                <option value="theme-pink">بناتي (Pink Dream)</option>
                <option value="theme-blue">هادئ (Ice Blue)</option>
            </select>
            <button class="btn" style="background:var(--danger); margin-top:20px;" onclick="clearAllData()">مسح البيانات</button>
        </div>

        <div class="glass-card">
            <div id="l_balanceLabel" style="opacity:0.8;">الرصيد المتاح</div>
            <div id="liveBalance" class="balance-value">0.00</div>
            <div class="stats-grid">
                <div class="stat-box"><div style="color:var(--success)" id="l_inc">إيراد</div><div id="totalIncome">0</div></div>
                <div class="stat-box"><div style="color:var(--danger)" id="l_exp">مصروف</div><div id="totalExpenses">0</div></div>
            </div>
        </div>

        <button class="mic-btn" id="micBtn" onclick="startVoice()">🎙️</button>
        <div id="l_micHint" style="font-size:12px; margin-bottom:15px; color:var(--accent);"></div>

        <div class="glass-card">
            <input type="text" id="description" placeholder="البيان">
            <input type="number" id="amount" placeholder="المبلغ">
            <select id="type">
                <option value="expense" id="l_optExp">صرف (-)</option>
                <option value="income" id="l_optInc">دخل (+)</option>
            </select>
            
            <div style="margin:10px 0;">
                <div class="serious-view" id="l_statusLabel">تصنيف العملية:</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div class="mood-btn selected" id="m1" onclick="selectMood('😊', 'm1')">
                        <span class="emoji-view">😊</span><span class="serious-view" id="l_s1">عادي</span>
                    </div>
                    <div class="mood-btn" id="m2" onclick="selectMood('😎', 'm2')">
                        <span class="emoji-view">😎</span><span class="serious-view" id="l_s2">استثمار</span>
                    </div>
                    <div class="mood-btn" id="m3" onclick="selectMood('😢', 'm3')">
                        <span class="emoji-view">😢</span><span class="serious-view" id="l_s3">ضروري</span>
                    </div>
                    <div class="mood-btn" id="m4" onclick="selectMood('😡', 'm4')">
                        <span class="emoji-view">😡</span><span class="serious-view" id="l_s4">طوارئ</span>
                    </div>
                </div>
            </div>
            
            <button id="l_addBtn" class="btn" onclick="addEntry()">حفظ العملية</button>
        </div>

        <table><tbody id="tableBody"></tbody></table>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('rahim_pro_v2') || "[]");
        let savedPin = localStorage.getItem('rahim_pin');
        let currentLang = localStorage.getItem('rahim_lang') || 'ar';
        let currentTheme = localStorage.getItem('rahim_theme') || 'theme-gold';
        let currentMood = '😊';

        const i18n = {
            ar: {
                lockTitle: "الرمز السري", mainTitle: "نظام حسابات رحيم", settings: "الإعدادات",
                langLabel: "اللغة:", themeLabel: "المظهر:", balanceLabel: "إجمالي الرصيد",
                inc: "إيرادات", exp: "مصروفات", micHint: "اضغط واتكلم (جالي 100 جنيه)",
                optExp: "صرف (-)", optInc: "دخل (+)", addBtn: "حفظ السجل",
                statusLabel: "الحالة:", s1: "عادي", s2: "استثمار", s3: "ضروري", s4: "طوارئ"
            },
            en: {
                lockTitle: "Security Pin", mainTitle: "Rahim Financials", settings: "Settings",
                langLabel: "Language:", themeLabel: "Theme Style:", balanceLabel: "Current Balance",
                inc: "Income", exp: "Expenses", micHint: "Tap & Speak (I got 100 bucks)",
                optExp: "Expense (-)", optInc: "Income (+)", addBtn: "Save Record",
                statusLabel: "Type:", s1: "Normal", s2: "Invest", s3: "Urgent", s4: "Emergency"
            }
        };

        function applyLanguage() {
            const t = i18n[currentLang];
            const isAr = currentLang === 'ar';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('appContent').className = isAr ? '' : 'ltr';
            document.getElementById('l_lockTitle').innerText = t.lockTitle;
            document.getElementById('l_mainTitle').innerText = t.mainTitle;
            document.getElementById('l_settings').innerText = t.settings;
            document.getElementById('l_langLabel').innerText = t.langLabel;
            document.getElementById('l_themeLabel').innerText = t.themeLabel;
            document.getElementById('l_balanceLabel').innerText = t.balanceLabel;
            document.getElementById('l_inc').innerText = t.inc; document.getElementById('l_exp').innerText = t.exp;
            document.getElementById('l_micHint').innerText = t.micHint;
            document.getElementById('l_optExp').innerText = t.optExp; document.getElementById('l_optInc').innerText = t.optInc;
            document.getElementById('l_addBtn').innerText = t.addBtn;
            document.getElementById('l_statusLabel').innerText = t.statusLabel;
            document.getElementById('l_s1').innerText = t.s1; document.getElementById('l_s2').innerText = t.s2;
            document.getElementById('l_s3').innerText = t.s3; document.getElementById('l_s4').innerText = t.s4;
            updateUI();
        }

        function changeTheme() {
            currentTheme = document.getElementById('themeSelect').value;
            document.body.className = currentTheme;
            localStorage.setItem('rahim_theme', currentTheme);
            updateUI();
        }

        window.onload = () => {
            document.getElementById('langSelect').value = currentLang;
            document.getElementById('themeSelect').value = currentTheme;
            document.body.className = currentTheme;
            applyLanguage();
        };

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = currentLang === 'ar' ? 'ar-EG' : 'en-US';
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('description').value = text;
                const num = text.match(/\d+/); if (num) document.getElementById('amount').value = num[0];
                const incW = ["جالي", "أخدت", "دخل", "got", "received", "income"];
                if (incW.some(w => text.includes(w))) document.getElementById('type').value = "income";
                else document.getElementById('type').value = "expense";
                document.getElementById('micBtn').classList.remove('mic-active');
            };
            rec.start();
        }

        function updateUI() {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let balance = 0, inc = 0, exp = 0;
            transactions.forEach((t, i) => {
                const amt = parseFloat(t.amount);
                const isInc = t.type === 'income';
                balance += isInc ? amt : -amt;
                if(isInc) inc += amt; else exp += amt;

                let statusInfo = `<span class="emoji-view">${t.mood}</span>`;
                if(currentTheme === 'theme-gold') {
                    const map = {'😊': i18n[currentLang].s1, '😎': i18n[currentLang].s2, '😢': i18n[currentLang].s3, '😡': i18n[currentLang].s4};
                    statusInfo = `<span class="serious-view" style="color:var(--accent)">${map[t.mood]}</span>`;
                }

                body.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td style="opacity:0.5; font-size:10px;">${t.date}</td>
                        <td>${statusInfo} ${t.desc}</td>
                        <td style="color:${isInc?'var(--success)':'var(--danger)'}; font-weight:900;">${amt}</td>
                        <td><button onclick="deleteEntry(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button></td>
                    </tr>
                `);
            });
            document.getElementById('liveBalance').innerText = balance.toFixed(2);
            document.getElementById('totalIncome').innerText = inc.toFixed(2);
            document.getElementById('totalExpenses').innerText = exp.toFixed(2);
            localStorage.setItem('rahim_pro_v2', JSON.stringify(transactions));
        }

        function checkPinAuto() { if(document.getElementById('pinCode').value === (savedPin || "1234")) { document.getElementById('lockScreen').style.display='none'; document.getElementById('appContent').style.display='block'; updateUI(); } }
        function changeLanguage() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('rahim_lang', currentLang); applyLanguage(); }
        function selectMood(m, id) { currentMood = m; document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected')); document.getElementById(id).classList.add('selected'); }
        function addEntry() {
            const d = document.getElementById('description').value, a = document.getElementById('amount').value;
            if (!d || !a) return;
            transactions.push({ desc: d, amount: a, type: document.getElementById('type').value, mood: currentMood, date: new Date().toLocaleDateString() });
            updateUI(); document.getElementById('description').value = ""; document.getElementById('amount').value = "";
        }
        function deleteEntry(i) { if(confirm("حذف؟")) { transactions.splice(i, 1); updateUI(); } }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function clearAllData() { if(confirm("حذف الكل؟")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
                    </html>
