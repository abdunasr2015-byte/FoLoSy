<!DOCTYPE html><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLoSy Multi-Theme</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37;
            --success: #28a745; --danger: #dc3545;
        }
        /* تعريف الثيمات */
        body.theme-gold { --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #d4af37; }
        body.theme-green { --bg: #064e3b; --card: #065f46; --text: #fff; --accent: #34d399; }
        body.theme-pink { --bg: #fff1f2; --card: #ffffff; --text: #881337; --accent: #fb7185; }
        body.theme-blue { --bg: #f0f9ff; --card: #ffffff; --text: #0c4a6e; --accent: #0ea5e9; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; text-align: center; transition: 0.5s;
        }

        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center;
        }

        .balance-value { font-size: 45px; font-weight: 900; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { border: 1px solid var(--accent); padding: 10px; border-radius: 12px; }

        input, select {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--accent); font-size: 16px;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; width: 100%; background: var(--accent); }

        .mic-btn {
            background: var(--accent); width: 70px; height: 70px; border-radius: 50%; 
            margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 30px;
            border: 2px solid #fff; color: white; cursor: pointer;
        }
        .mic-active { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .mood-btn { font-size: 26px; cursor: pointer; padding: 10px; border-radius: 12px; border: 1px solid transparent; }
        .mood-btn.selected { border-color: var(--accent); background: rgba(0,0,0,0.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--accent); font-size: 13px; }

        .settings-panel { display: none; text-align: right; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--accent); }
        .active { display: block; }

        /* تعديل الاتجاه للغة الإنجليزية */
        .ltr { direction: ltr; text-align: left; }
    </style>
</head>
<body id="mainBody" class="theme-gold">

    <div id="lockScreen">
        <div class="glass-card" style="width: 85%; max-width: 320px;">
            <h2 id="l_lockTitle">🔒</h2>
            <input type="password" id="pinCode" maxlength="4" placeholder="****" inputmode="numeric" oninput="checkPinAuto()" style="text-align: center; letter-spacing: 15px; font-size: 30px;">
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <button onclick="toggleSettings()" style="background:none; border:none; font-size:26px; cursor:pointer;">⚙️</button>
            <h2 id="l_mainTitle" style="margin:0; color:var(--accent);">FoLoSy</h2>
            <div style="width:26px"></div>
        </div>

        <div id="settingsPanel" class="settings-panel">
            <h3 id="l_settings">الإعدادات</h3>
            
            <label id="l_langLabel">اللغة / Language:</label>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="ar">العربية (العامية)</option>
                <option value="en">English (Slang)</option>
            </select>

            <label style="display:block; margin-top:15px;" id="l_themeLabel">اختر المظهر (Theme):</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="theme-gold">فخامة (Black Gold)</option>
                <option value="theme-green">طبيعة (Green Nature)</option>
                <option value="theme-pink">بناتي (Pink Dream)</option>
                <option value="theme-blue">هادئ (Ice Blue)</option>
            </select>

            <button class="btn" style="background:var(--danger); margin-top:20px;" id="l_clear" onclick="clearAllData()">مسح البيانات</button>
        </div>

        <div class="glass-card">
            <div id="l_balanceLabel" style="opacity: 0.8;">الرصيد</div>
            <div id="liveBalance" class="balance-value">0.00</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div style="color:var(--success)" id="l_totalInc">دخل</div>
                    <div id="totalIncome">0</div>
                </div>
                <div class="stat-box">
                    <div style="color:var(--danger)" id="l_totalExp">صرف</div>
                    <div id="totalExpenses">0</div>
                </div>
            </div>
        </div>

        <button class="mic-btn" id="micBtn" onclick="startVoice()">🎙️</button>
        <div id="l_micHint" style="font-size:12px; color:var(--accent); margin-bottom:15px;"></div>

        <div class="glass-card">
            <input type="text" id="description" placeholder="..">
            <input type="number" id="amount" placeholder="..">
            <select id="type">
                <option value="expense" id="l_optExp">صرف</option>
                <option value="income" id="l_optInc">دخل</option>
            </select>
            <div class="mood-selector" style="display:flex; justify-content:center; gap:10px; margin:10px 0;">
                <div class="mood-btn selected" id="m1" onclick="selectMood('😊', 'm1')">😊</div>
                <div class="mood-btn" id="m2" onclick="selectMood('😎', 'm2')">😎</div>
                <div class="mood-btn" id="m3" onclick="selectMood('😢', 'm3')">😢</div>
                <div class="mood-btn" id="m4" onclick="selectMood('😡', 'm4')">😡</div>
            </div>
            <button id="l_addBtn" class="btn" onclick="addEntry()">حفظ</button>
        </div>

        <table id="mainTable">
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('rahim_multi_v1') || "[]");
        let savedPin = localStorage.getItem('rahim_pin');
        let currentLang = localStorage.getItem('rahim_lang') || 'ar';
        let currentTheme = localStorage.getItem('rahim_theme') || 'theme-gold';
        let currentMood = '😊';

        const i18n = {
            ar: {
                lockTitle: "ادخل الكود السري 🔒", mainTitle: "حسابات رحيم", settings: "الإعدادات",
                langLabel: "اللغة:", themeLabel: "المظهر:", clear: "مسح كل البيانات", balanceLabel: "الرصيد الحالي",
                totalInc: "إجمالي الإيرادات", totalExp: "إجمالي المصروفات", micHint: "اضغط واتكلم (جالي 50 جنيه)",
                optExp: "مصروف (-)", optInc: "إيراد (+)", addBtn: "حفظ العملية",
                descPh: "البيان (عملت إيه؟)", amtPh: "المبلغ", incWords: ["أخدت", "جالي", "استلمت", "تحولي"],
                expWords: ["دفعت", "صرفت", "اشتريت", "خرجت"]
            },
            en: {
                lockTitle: "Enter Passcode 🔒", mainTitle: "Rahim's Wallet", settings: "Settings",
                langLabel: "Language:", themeLabel: "Theme:", clear: "Clear All Data", balanceLabel: "Current Balance",
                totalInc: "Total Income", totalExp: "Total Expenses", micHint: "Tap to speak (I spent 20 bucks)",
                optExp: "Expense (-)", optInc: "Income (+)", addBtn: "Save Transaction",
                descPh: "Description", amtPh: "Amount", incWords: ["got", "received", "income", "earned"],
                expWords: ["spent", "bought", "paid", "lost"]
            }
        };

        function changeTheme() {
            currentTheme = document.getElementById('themeSelect').value;
            document.body.className = currentTheme;
            localStorage.setItem('rahim_theme', currentTheme);
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('rahim_lang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = i18n[currentLang];
            const isAr = currentLang === 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('appContent').className = isAr ? '' : 'ltr';
            document.getElementById('settingsPanel').style.textAlign = isAr ? 'right' : 'left';

            document.getElementById('l_lockTitle').innerText = t.lockTitle;
            document.getElementById('l_mainTitle').innerText = t.mainTitle;
            document.getElementById('l_settings').innerText = t.settings;
            document.getElementById('l_langLabel').innerText = t.langLabel;
            document.getElementById('l_themeLabel').innerText = t.themeLabel;
            document.getElementById('l_clear').innerText = t.clear;
            document.getElementById('l_balanceLabel').innerText = t.balanceLabel;
            document.getElementById('l_totalInc').innerText = t.totalInc;
            document.getElementById('l_totalExp').innerText = t.totalExp;
            document.getElementById('l_micHint').innerText = t.micHint;
            document.getElementById('l_optExp').innerText = t.optExp;
            document.getElementById('l_optInc').innerText = t.optInc;
            document.getElementById('l_addBtn').innerText = t.addBtn;
            document.getElementById('description').placeholder = t.descPh;
            document.getElementById('amount').placeholder = t.amtPh;
            updateUI();
        }

        window.onload = () => {
            document.getElementById('langSelect').value = currentLang;
            document.getElementById('themeSelect').value = currentTheme;
            document.body.className = currentTheme;
            applyLanguage();
        };

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = currentLang === 'ar' ? 'ar-EG' : 'en-US';
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('description').value = text;
                const num = text.match(/\d+/); if (num) document.getElementById('amount').value = num[0];
                const t = i18n[currentLang];
                if (t.incWords.some(w => text.includes(w))) document.getElementById('type').value = "income";
                else if (t.expWords.some(w => text.includes(w))) document.getElementById('type').value = "expense";
                document.getElementById('micBtn').classList.remove('mic-active');
            };
            rec.start();
        }

        function updateUI() {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let balance = 0, incSum = 0, expSum = 0;
            transactions.forEach((t, i) => {
                const amt = parseFloat(t.amount);
                if (t.type === 'income') { balance += amt; incSum += amt; }
                else { balance -= amt; expSum += amt; }
                body.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td>${t.date}</td>
                        <td>${t.mood} ${t.desc}</td>
                        <td style="color:${t.type==='income'?'var(--success)':'var(--danger)'}; font-weight:bold;">${amt}</td>
                        <td><button onclick="deleteEntry(${i})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
                    </tr>
                `);
            });
            const balDiv = document.getElementById('liveBalance');
            balDiv.innerText = balance.toFixed(2);
            balDiv.style.color = balance >= 0 ? "var(--success)" : "var(--danger)";
            document.getElementById('totalIncome').innerText = incSum.toFixed(2);
            document.getElementById('totalExpenses').innerText = expSum.toFixed(2);
            localStorage.setItem('rahim_multi_v1', JSON.stringify(transactions));
        }

        function checkPinAuto() {
            const val = document.getElementById('pinCode').value;
            if (val.length === 4) {
                if (!savedPin) { localStorage.setItem('rahim_pin', val); savedPin = val; unlockApp(); }
                else if (val === savedPin) unlockApp();
                else { document.getElementById('pinCode').value = ""; alert("Wrong Pin!"); }
            }
        }
        function unlockApp() { document.getElementById('lockScreen').style.display = 'none'; document.getElementById('appContent').style.display = 'block'; updateUI(); }
        function addEntry() {
            const d = document.getElementById('description').value, a = document.getElementById('amount').value;
            if (!d || !a) return;
            transactions.push({ desc: d, amount: a, type: document.getElementById('type').value, mood: currentMood, date: new Date().toLocaleDateString() });
            updateUI(); document.getElementById('description').value = ""; document.getElementById('amount').value = "";
        }
        function deleteEntry(i) { transactions.splice(i, 1); updateUI(); }
        function selectMood(m, id) { currentMood = m; document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected')); document.getElementById(id).classList.add('selected'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function clearAllData() { if(confirm("Clear?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
    </html>
