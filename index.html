<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابات رحيم المحترفة</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --success: #28a745; --danger: #dc3545; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; padding: 15px; margin: 0; text-align: center; }
        .balance-card { background: linear-gradient(45deg, #1a2a6c, #b21f1f); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .balance-value { font-size: 30px; font-weight: bold; }
        .chart-box { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; height: 200px; }
        .input-group { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #222; color: white; border: 1px solid #444; }
        .btn { border: none; padding: 12px 25px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); }
        th, td { border: 1px solid #333; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div>الرصيد الحالي 💰</div>
        <div id="liveBalance" class="balance-value">0.00</div>
    </div>

    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>

    <div class="input-group">
        <input type="text" id="description" placeholder="البيان">
        <input type="number" id="amount" placeholder="المبلغ">
        <select id="type">
            <option value="income">إيراد (+)</option>
            <option value="expense">مصروف (-)</option>
        </select>
        <button class="btn" style="background:var(--success); width: 100%;" onclick="addEntry()">إضافة المعاملة</button>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>البيان</th>
                    <th>المبلغ</th>
                    <th>الرصيد</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // تحميل البيانات من الذاكرة
        let transactions = JSON.parse(localStorage.getItem('rahim_data_v4') || "[]");
        let myChart = null;

        function updateUI() {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let currentBalance = 0;
            let totalIn = 0;
            let totalOut = 0;

            transactions.forEach((t) => {
                const amt = parseFloat(t.amount);
                if(t.type === 'income') {
                    currentBalance += amt;
                    totalIn += amt;
                } else {
                    currentBalance -= amt;
                    totalOut += amt;
                }
                
                // إضافة للجدول
                const row = `<tr>
                    <td>${t.desc}<br><small>${t.date}</small></td>
                    <td style="color:${t.type==='income'?'#28a745':'#dc3545'}">${amt}</td>
                    <td>${currentBalance.toFixed(2)}</td>
                </tr>`;
                body.insertAdjacentHTML('afterbegin', row);
            });

            document.getElementById('liveBalance').innerText = currentBalance.toFixed(2) + " ج.م";
            localStorage.setItem('rahim_data_v4', JSON.stringify(transactions));
            
            // تحديث الرسم البياني لو المكتبة حملت
            if (typeof Chart !== 'undefined') {
                drawChart(totalIn, totalOut);
            }
        }

        function drawChart(tin, tout) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['إيراد', 'مصروف'],
                    datasets: [{
                        data: [tin, tout],
                        backgroundColor: ['#28a745', '#dc3545'],
                        hoverOffset: 4
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function addEntry() {
            const desc = document.getElementById('description').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;

            if(!desc || !amount) return alert("اكتب البيانات يا رحيم");

            transactions.push({
                desc: desc,
                amount: amount,
                type: type,
                date: new Date().toLocaleTimeString()
            });

            updateUI();
            document.getElementById('description').value = "";
            document.getElementById('amount').value = "";
        }

        // تشغيل البرنامج عند الفتح
        window.onload = updateUI;
    </script>
</body>
</html>
