<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLoSy Pro - رحيم</title>
    <style>
        :root {
            --bg: #0f172a; --card: rgba(255, 255, 255, 0.05);
            --text: #ffffff; --accent: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --gold: #fbbf24;
        }
        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #0ea5e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; text-align: center; transition: 0.4s;
        }

        /* شاشة القفل النظيفة */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .lock-box {
            background: var(--card); padding: 40px; border-radius: 25px;
            backdrop-filter: blur(20px); border: 1px solid var(--accent);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 85%; max-width: 350px;
        }
        .pin-input {
            width: 160px; letter-spacing: 15px; font-size: 35px; text-align: center;
            padding: 15px; border-radius: 12px; border: 2px solid var(--accent);
            background: rgba(0,0,0,0.3); color: var(--gold); margin: 20px 0; outline: none;
        }

        /* التصميم العام */
        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .balance-value { font-size: 40px; font-weight: 800; color: var(--gold); margin: 10px 0; }
        .mood-stats { display: flex; justify-content: space-around; font-size: 14px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        input[type="text"], input[type="number"], input[type="password"], input[type="date"], select {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(0,0,0,0.2); color: var(--text); border: 1px solid rgba(255,255,255,0.1); font-size: 16px; outline: none;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; }
        .btn:active { transform: scale(0.95); }

        /* المايك */
        .mic-btn {
            background: linear-gradient(45deg, var(--accent), #7c4dff);
            width: 75px; height: 75px; border-radius: 50%; margin: 10px auto;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            border: none; color: white; cursor: pointer; box-shadow: 0 0 15px var(--accent);
        }
        .mic-active { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .mood-selector { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .mood-btn { font-size: 26px; cursor: pointer; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .mood-btn.selected { background: var(--accent); transform: scale(1.15); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; text-align: center; }

        .settings-panel { display: none; text-align: right; background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--accent); }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* الطباعة النظيفة */
        @media print {
            #lockScreen, .btn, .mic-btn, #micStatus, .mood-selector, .settings-toggle, .settings-panel, input, select, .no-print, .filter-area { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-card { background: white !important; border: 1px solid black; box-shadow: none; color: black !important; margin-bottom: 10px; }
            .balance-value, .mood-stats { color: black !important; }
            table { border: 1px solid black; color: black !important; }
            th, td { border: 1px solid black !important; color: black !important; }
        }
    </style>
</head>
<body id="mainBody">

    <div id="lockScreen">
        <div class="lock-box">
            <h2 id="lockTitle">تأمين FoLoSy 🔒</h2>
            <p id="lockDesc" style="font-size: 14px; opacity: 0.8;">اكتب الكود (4 أرقام)</p>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" placeholder="****" inputmode="numeric" oninput="checkPinAuto()">
            <p id="lockMsg" style="color: var(--danger); font-size: 13px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <button onclick="toggleSettings()" class="settings-toggle" style="background:none; border:none; font-size:26px; cursor:pointer;">⚙️</button>
            <h2 id="userTitle" style="color:var(--gold); margin:0;">حسابات رحيم</h2>
            <div style="width:26px"></div>
        </div>

        <div id="settingsPanel" class="settings-panel">
            <label>اسمك المبرمج:</label>
            <input type="text" id="userNameInput" onchange="saveName()">
            
            <label style="display: block; margin-top: 15px; font-size: 14px;">تغيير الباسورد السري:</label>
            <div style="display: flex; gap: 5px; align-items: center;">
                <input type="password" id="newPinInput" maxlength="4" placeholder="الكود الجديد" style="flex: 2; margin: 0;">
                <button class="btn" style="background:var(--success); flex: 1; padding: 12px;" onclick="updatePin()">تحديث</button>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="background:#000; flex:1;" onclick="setTheme('dark')">وضع الليل</button>
                <button class="btn" style="background:#fff; color:#000; flex:1; border: 1px solid #ccc;" onclick="setTheme('light')">وضع النهار</button>
            </div>
            <button class="btn" style="background:var(--danger); margin-top:20px;" onclick="clearAllData()">⚠️ مسح كل البيانات نهائياً</button>
        </div>

        <div class="glass-card">
            <div style="opacity: 0.8; font-size: 15px;">الرصيد المتاح</div>
            <div id="liveBalance" class="balance-value">0.00</div>
            <div class="mood-stats">
                <span>😊 سعيد: <b id="happySpend" style="color: var(--success);">0</b></span>
                <span>😢 حزين: <b id="sadSpend" style="color: var(--danger);">0</b></span>
            </div>
        </div>

        <button class="mic-btn" id="micBtn" onclick="startVoice()">🎙️</button>
        <div id="micStatus" style="font-size:13px; color:var(--accent); margin-bottom:15px; font-weight:bold;">اضغط واتكلم (مثال: أخدت 50 جنيه)</div>

        <div class="glass-card">
            <input type="text" id="description" placeholder="البيان (اشتريت إيه؟)">
            <input type="number" id="amount" placeholder="المبلغ">
            <select id="type">
                <option value="expense">مصروف (-)</option>
                <option value="income">إيراد (+)</option>
            </select>
            
            <div class="mood-selector">
                <div class="mood-btn selected" id="m1" onclick="selectMood('😊', 'm1')">😊</div>
                <div class="mood-btn" id="m2" onclick="selectMood('😎', 'm2')">😎</div>
                <div class="mood-btn" id="m3" onclick="selectMood('😢', 'm3')">😢</div>
                <div class="mood-btn" id="m4" onclick="selectMood('😡', 'm4')">😡</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="addBtn" class="btn" style="background:var(--success); flex: 3;" onclick="addEntry()">حفظ العملية</button>
                <button class="btn" style="background:var(--accent); flex: 1;" onclick="window.print()">🖨️</button>
            </div>
        </div>

        <div class="filter-area" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
            <div style="display: flex; gap: 10px; align-items: center; font-size: 13px;">
                من: <input type="date" id="fromDate" onchange="updateUI()">
                إلى: <input type="date" id="toDate" onchange="updateUI()">
            </div>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>التاريخ</th><th>البيان</th><th>حالة</th><th>المبلغ</th><th class="no-print">تحكم</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('rahim_final_v1') || "[]");
        let savedPin = localStorage.getItem('rahim_pin');
        let currentMood = '😊';
        let editIndex = -1;

        window.onload = () => {
            if (!savedPin) {
                document.getElementById('lockTitle').innerText = "إنشاء كود سري 🆕";
                document.getElementById('lockDesc').innerText = "اكتب 4 أرقام عشان نحفظهم كباسورد ليك";
            } else {
                document.getElementById('lockTitle').innerText = "أهلاً يا رحيم 🔒";
                document.getElementById('lockDesc').innerText = "اكتب الكود السري بتاعك";
            }
            
            const n = localStorage.getItem('rahim_name');
            if(n) {
                document.getElementById('userTitle').innerText = "حسابات " + n;
                document.getElementById('userNameInput').value = n;
            }
            const t = localStorage.getItem('rahim_theme');
            if(t) setTheme(t);
        };

        // الدخول التلقائي الذكي
        function checkPinAuto() {
            const inputField = document.getElementById('pinCode');
            const val = inputField.value;
            const msg = document.getElementById('lockMsg');

            if (val.length === 4) {
                if (!savedPin) {
                    localStorage.setItem('rahim_pin', val);
                    savedPin = val;
                    unlockApp();
                } else {
                    if (val === savedPin) {
                        unlockApp();
                    } else {
                        msg.innerText = "الكود غلط يا بطل! جرب تاني ❌";
                        inputField.value = "";
                    }
                }
            } else {
                msg.innerText = "";
            }
        }

        function unlockApp() {
            document.getElementById('lockScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                updateUI();
            }, 300);
        }

        // المايك
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("متصفحك مش بيدعم المايك، جرب جوجل كروم.");
            
            const rec = new SpeechRecognition();
            rec.lang = 'ar-EG';
            rec.onstart = () => {
                document.getElementById('micBtn').classList.add('mic-active');
                document.getElementById('micStatus').innerText = "اتكلم، أنا سامعك...";
            };
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('description').value = text;
                const num = text.match(/\d+/); 
                if (num) document.getElementById('amount').value = num[0];
                
                if (text.includes("أخدت") || text.includes("استلمت") || text.includes("إيراد") || text.includes("مصروف")) {
                    document.getElementById('type').value = "income";
                } else {
                    document.getElementById('type').value = "expense";
                }
                
                document.getElementById('micBtn').classList.remove('mic-active');
                document.getElementById('micStatus').innerText = "تم تسجيل كلامك!";
            };
            rec.onerror = () => {
                document.getElementById('micBtn').classList.remove('mic-active');
                document.getElementById('micStatus').innerText = "مسمعتش حاجة، جرب تاني.";
            };
            rec.start();
        }

        function selectMood(m, id) {
            currentMood = m;
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function updateUI() {
            const body = document.getElementById('tableBody');
            const from = document.getElementById('fromDate').value;
            const to = document.getElementById('toDate').value;
            body.innerHTML = "";
            let balance = 0, happy = 0, sad = 0;

            transactions.forEach((t, i) => {
                const tDate = new Date(t.fullDate).setHours(0,0,0,0);
                const fDate = from ? new Date(from).setHours(0,0,0,0) : -Infinity;
                const oDate = to ? new Date(to).setHours(0,0,0,0) : Infinity;

                if (tDate >= fDate && tDate <= oDate) {
                    const amt = parseFloat(t.amount);
                    if (t.type === 'income') balance += amt;
                    else {
                        balance -= amt;
                        if (t.mood === '😊' || t.mood === '😎') happy += amt; 
                        else if (t.mood === '😢' || t.mood === '😡') sad += amt;
                    }

                    body.insertAdjacentHTML('afterbegin', `
                        <tr>
                            <td style="font-size: 11px;">${t.date}</td>
                            <td style="font-weight:bold">${t.desc}</td>
                            <td style="font-size:22px">${t.mood}</td>
                            <td style="color:${t.type==='income'?'var(--success)':'var(--danger)'}; font-weight:900;">${amt}</td>
                            <td class="no-print">
                                <button onclick="editEntry(${i})" style="border:none; background:none; cursor:pointer; font-size: 18px;">📝</button>
                                <button onclick="deleteEntry(${i})" style="border:none; background:none; cursor:pointer; font-size: 18px;">🗑️</button>
                            </td>
                        </tr>
                    `);
                }
            });
            document.getElementById('liveBalance').innerText = balance.toFixed(2) + " ج.م";
            document.getElementById('happySpend').innerText = happy;
            document.getElementById('sadSpend').innerText = sad;
            localStorage.setItem('rahim_final_v1', JSON.stringify(transactions));
        }

        function addEntry() {
            const d = document.getElementById('description').value;
            const a = document.getElementById('amount').value;
            if (!d || !a) return alert("لازم تكتب البيان والمبلغ يا رحيم!");
            
            const entry = {
                desc: d, amount: a, type: document.getElementById('type').value,
                mood: currentMood, date: new Date().toLocaleDateString('ar-EG'), fullDate: new Date().toISOString()
            };

            if (editIndex > -1) { 
                transactions[editIndex] = entry; editIndex = -1; 
                document.getElementById('addBtn').innerText = "حفظ العملية"; 
            } else { transactions.push(entry); }
            
            updateUI();
            document.getElementById('description').value = ""; document.getElementById('amount').value = "";
            selectMood('😊', 'm1'); document.getElementById('type').value = "expense";
        }

        function editEntry(i) {
            const t = transactions[i];
            document.getElementById('description').value = t.desc;
            document.getElementById('amount').value = t.amount;
            document.getElementById('type').value = t.type;
            editIndex = i;
            document.getElementById('addBtn').innerText = "تحديث العملية المحددة";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteEntry(i) { if (confirm("متأكد إنك عايز تمسح العملية دي؟")) { transactions.splice(i, 1); updateUI(); } }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function saveName() { localStorage.setItem('rahim_name', document.getElementById('userNameInput').value); location.reload(); }
        function setTheme(t) { document.body.className = t === 'light' ? 'light-mode' : ''; localStorage.setItem('rahim_theme', t); }
        
        // الدالة الجديدة لتغيير الباسورد من الإعدادات
        function updatePin() {
            const newPin = document.getElementById('newPinInput').value;
            if(newPin.length === 4) {
                localStorage.setItem('rahim_pin', newPin);
                savedPin = newPin; // تحديث المتغير الحالي
                alert("عاش يا بطل! تم تغيير الباسورد السري بنجاح ✅");
                document.getElementById('newPinInput').value = ""; // تفريغ الخانة
            } else {
                alert("الباسورد لازم يكون 4 أرقام بالظبط يا رحيم!");
            }
        }

        function clearAllData() { if (confirm("تحذير: ده هيمسح الباسورد وكل الحسابات نهائياً! متأكد؟")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
                         </html>
