<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLoSy Mega Ultimate - رحيم</title>
    <style>
        :root {
            --bg: #000; --card: #111; --text: #fff; --accent: #d4af37;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --success: #28a745; --danger: #dc3545;
        }

        /* الثيمات المتعددة */
        body.theme-gold { --bg: #000; --card: #111; --text: #fff; --accent: #d4af37; }
        body.theme-green { --bg: #064e3b; --card: #065f46; --text: #fff; --accent: #34d399; }
        body.theme-pink { --bg: #fff1f2; --card: #ffffff; --text: #881337; --accent: #fb7185; }
        body.theme-blue { --bg: #0f172a; --card: #1e293b; --text: #fff; --accent: #38bdf8; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; text-align: center; transition: 0.5s;
        }

        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* شاشة القفل الفخمة */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .lock-box { background: var(--card); border: 2px solid var(--accent); border-radius: 25px; padding: 30px; width: 280px; }

        /* الرصيد الصافي */
        .balance-value { 
            font-size: 50px; font-weight: 900; margin: 10px 0; 
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        body.theme-green .balance-value, body.theme-pink .balance-value, body.theme-blue .balance-value {
            -webkit-text-fill-color: var(--accent);
        }

        input, select {
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px;
            background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--accent); font-size: 16px; outline: none;
        }

        .btn-gold { 
            background: var(--gold-gradient); color: #000; font-weight: bold; 
            border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 16px; 
        }
        body.theme-green .btn-gold, body.theme-pink .btn-gold, body.theme-blue .btn-gold {
            background: var(--accent); color: var(--bg);
        }

        /* المايك الذكي */
        .mic-btn {
            background: var(--accent); width: 75px; height: 75px; border-radius: 50%; 
            margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 35px;
            border: 3px solid #000; color: #000; cursor: pointer; box-shadow: 0 0 20px var(--accent);
        }
        .mic-active { background: var(--danger) !important; animation: pulse 1s infinite; color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* الجدول والتحكم */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(212,175,55,0.2); font-size: 14px; }

        .settings-panel { display: none; text-align: right; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .active { display: block; animation: slideDown 0.3s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* دعم الإنجليزية */
        .ltr { direction: ltr; text-align: left; }

        /* --- تحديث الطباعة النهائي للوضوح العالي --- */
        @media print {
            .no-print { display: none !important; }
            
            body { 
                background: white !important; 
                color: black !important; 
                font-family: 'Arial', sans-serif;
            }

            /* تحويل كارت الرصيد لشكل شيك في الطباعة */
            .glass-card, .balance-card { 
                background: white !important; 
                border: 2px solid black !important; 
                color: black !important;
                box-shadow: none !important;
                border-radius: 10px !important;
                margin-bottom: 20px !important;
                padding: 15px !important;
            }

            /* إظهار قيمة الرصيد بوضوح */
            .balance-value { 
                -webkit-text-fill-color: black !important; 
                color: black !important; 
                font-size: 35pt !important; 
                font-weight: bold !important;
                text-align: center !important;
                display: block !important;
                margin: 5px 0 !important;
            }

            /* توضيح العناوين الصغيرة داخل الكارت */
            #l_balanceLabel, .balance-label {
                color: black !important;
                font-size: 14pt !important;
                font-weight: bold !important;
                opacity: 1 !important;
            }

            /* تنسيق الجدول ليكون مثل جداول المحاسبة */
            table { 
                width: 100% !important; 
                border-collapse: collapse !important; 
                margin-top: 20px !important;
            }

            th { 
                background-color: #eeeeee !important; 
                border: 1px solid black !important; 
                color: black !important; 
                padding: 10px !important;
                font-size: 13pt !important;
            }

            td { 
                border: 1px solid #cccccc !important; 
                color: black !important; 
                padding: 10px !important;
                font-size: 12pt !important;
                text-align: center !important;
            }

            /* التأكد من أن المبالغ تظهر بلونها الصريح (أسود) */
            td[style*="color:var(--success)"], 
            td[style*="color:var(--danger)"] {
                color: black !important; 
                font-weight: bold !important;
            }        

            .positive-note {
    background: rgba(212, 175, 55, 0.1);
    border-right: 5px solid var(--accent);
    padding: 10px;
    margin: 15px 0;
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    border-radius: 5px;
    text-align: right;
            }
            </style>
</head>
<body id="mainBody" class="theme-gold">

    <div id="lockScreen">
        <div class="lock-box">
            <h2 id="l_lockTitle" style="color:var(--accent)">FoLoSy Secure 🔒</h2>
            <input type="password" id="pinCode" maxlength="4" placeholder="****" inputmode="numeric" oninput="checkPinAuto()" style="text-align: center; letter-spacing: 15px; font-size: 30px;">
            <p id="errorMsg" style="color:var(--danger); font-size:12px; height:20px;"></p>
            <button onclick="emergencyReset()" style="background:none; border:none; color:gray; font-size:11px; margin-top:20px; cursor:pointer; text-decoration:underline;">نسيت الباسورد؟ (تصفير البرنامج)</button>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <div class="no-print" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <button onclick="toggleSettings()" style="background:none; border:none; font-size:30px; cursor:pointer;">⚙️</button>
            <h2 id="l_mainTitle" style="margin:0; color:var(--accent); font-weight:900;">FoLoSy</h2>
            <button onclick="window.print()" style="background:none; border:none; font-size:30px; cursor:pointer;">🖨️</button>
        </div>

        <div id="settingsPanel" class="settings-panel no-print">
            <h3 id="l_settings">الإعدادات</h3>
            
            <label id="l_langLabel">اللغة / Language:</label>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="ar">العربية (رحيم)</option>
                <option value="en">English (Pro)</option>
            </select>

            <label style="display:block; margin-top:15px;" id="l_themeLabel">المظهر / Theme:</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="theme-gold">فخامة الدهبي (Black Gold)</option>
                <option value="theme-green">الطبيعة الخضراء (Nature)</option>
                <option value="theme-pink">اللون الوردي (Pinky)</option>
                <option value="theme-blue">الأزرق الهادئ (Blue Ice)</option>
            </select>

            <label style="display:block; margin-top:15px;">تغيير كود القفل:</label>
            <input type="number" id="newPinInput" placeholder="4 أرقام جديدة">
            <button class="btn-gold" onclick="updatePin()" style="margin-top:10px;">حفظ الكود الجديد</button>
        </div>

        <div class="glass-card">
            <div id="l_balanceLabel" style="opacity: 0.8; font-size:14px;">الرصيد الصافي المتوفر</div>
            <div id="liveBalance" class="balance-value">0.00</div>
            <div style="display:flex; justify-content:space-around; font-size:13px; border-top:1px solid rgba(212,175,55,0.2); padding-top:10px;">
                <span style="color:var(--success)">إيداع (+): <b id="totalIncome">0</b></span>
                <span style="color:var(--danger)">صرف (-): <b id="totalExpenses">0</b></span>
            </div>
        </div>

        <div class="no-print">
            <div class="mic-btn" id="micBtn" onclick="startVoice()">🎙️</div>
            <div id="l_micHint" style="font-size:11px; color:var(--accent); margin-bottom:15px;">اضغط واتكلم لإضافة عملية</div>

            <div class="glass-card">
                <input type="text" id="description" placeholder="البيان..">
                <input type="number" id="amount" placeholder="المبلغ..">
                <select id="type">
                    <option value="expense" id="l_optExp">صرف (-)</option>
                    <option value="income" id="l_optInc">دخل (+)</option>
                </select>
                <button id="l_addBtn" class="btn-gold" onclick="addEntry()">حفظ العملية</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>البيان</th>
                    <th>المبلغ</th>
                    <th class="no-print">تحكم</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
   <div id="quoteArea" class="positive-note no-print">
    ✨ نصيحة اليوم: "اللي يتدخر النهاردة، يرتاح بكرة يا بطل!"
</div>

    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('rahim_final_db') || "[]");
        let savedPin = localStorage.getItem('rahim_final_pin') || "1234";
        let currentLang = localStorage.getItem('rahim_final_lang') || 'ar';
        let currentTheme = localStorage.getItem('rahim_final_theme') || 'theme-gold';
        let editIndex = -1;

        const i18n = {
            ar: {
                lockTitle: "خزنة رحيم 🔒", mainTitle: "FoLoSy Gold", settings: "الإعدادات ⚙️",
                langLabel: "اللغة:", themeLabel: "المظهر:", balanceLabel: "الرصيد الصافي المتوفر",
                micHint: "جرب تقول: 'جالي 100 جنيه عيدية'", optExp: "صرف (-)", optInc: "دخل (+)", 
                addBtn: "حفظ العملية", descPh: "عملت إيه بالفلوس؟", amtPh: "المبلغ كام؟",
                incWords: ["جالي", "أخدت", "كسبت", "إيداع", "هدية", "استلمت"],
                expWords: ["صرفت", "دفعت", "اشتريت", "خرجت", "خسرت"]
            },
            en: {
                lockTitle: "Rahim's Vault 🔒", mainTitle: "FoLoSy Pro", settings: "Settings ⚙️",
                langLabel: "Language:", themeLabel: "Theme:", balanceLabel: "Net Balance",
                micHint: "Say: 'I spent 50 dollars'", optExp: "Expense (-)", optInc: "Income (+)", 
                addBtn: "Save Transaction", descPh: "Description", amtPh: "Amount",
                incWords: ["got", "received", "earned", "income", "gift"],
                expWords: ["spent", "paid", "bought", "lost"]
            }
        };

        // نظام القفل
        function checkPinAuto() {
            const val = document.getElementById('pinCode').value;
            if (val === savedPin) { unlockApp(); }
            else if (val.length === 4) {
                document.getElementById('errorMsg').innerText = "الكود غلط!";
                document.getElementById('pinCode').value = "";
            }
        }

        function unlockApp() {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            updateUI();
        }

        // تحديث الباسورد
        function updatePin() {
            const p = document.getElementById('newPinInput').value;
            if(p.length === 4) {
                localStorage.setItem('rahim_final_pin', p);
                savedPin = p;
                alert("تم تغيير الباسورد بنجاح!");
                toggleSettings();
            } else { alert("لازم 4 أرقام!"); }
        }

        // الثيمات واللغات
        function changeTheme() {
            currentTheme = document.getElementById('themeSelect').value;
            document.body.className = currentTheme;
            localStorage.setItem('rahim_final_theme', currentTheme);
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('rahim_final_lang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = i18n[currentLang];
            const isAr = currentLang === 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('appContent').className = isAr ? '' : 'ltr';

            document.getElementById('l_lockTitle').innerText = t.lockTitle;
            document.getElementById('l_mainTitle').innerText = t.mainTitle;
            document.getElementById('l_settings').innerText = t.settings;
            document.getElementById('l_langLabel').innerText = t.langLabel;
            document.getElementById('l_themeLabel').innerText = t.themeLabel;
            document.getElementById('l_balanceLabel').innerText = t.balanceLabel;
            document.getElementById('l_micHint').innerText = t.micHint;
            document.getElementById('l_optExp').innerText = t.optExp;
            document.getElementById('l_optInc').innerText = t.optInc;
            document.getElementById('l_addBtn').innerText = (editIndex > -1) ? (isAr ? "تحديث الآن" : "Update Now") : t.addBtn;
            document.getElementById('description').placeholder = t.descPh;
            document.getElementById('amount').placeholder = t.amtPh;
            updateUI();
        }

        // المايك الذكي
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("المتصفح لا يدعم المايك");
            const rec = new SpeechRecognition();
            rec.lang = currentLang === 'ar' ? 'ar-EG' : 'en-US';
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('description').value = text;
                const num = text.match(/\d+/); if (num) document.getElementById('amount').value = num[0];
                const t = i18n[currentLang];
                if (t.incWords.some(w => text.includes(w))) document.getElementById('type').value = "income";
                else document.getElementById('type').value = "expense";
                document.getElementById('micBtn').classList.remove('mic-active');
            };
            rec.onerror = () => document.getElementById('micBtn').classList.remove('mic-active');
            rec.start();
        }

        // إضافة وتعديل وحذف
        function addEntry() {
            const d = document.getElementById('description').value, a = document.getElementById('amount').value, ty = document.getElementById('type').value;
            if (!d || !a) return;
            const entry = { desc: d, amount: a, type: ty, date: new Date().toLocaleDateString(currentLang === 'ar' ? 'ar-EG' : 'en-US') };
            
            if(editIndex > -1) {
                transactions[editIndex] = entry;
                editIndex = -1;
            } else {
                transactions.push(entry);
            }
            
            document.getElementById('description').value = ""; document.getElementById('amount').value = "";
            applyLanguage();
            updateUI();
        }

        function editItem(i) {
            const t = transactions[i];
            document.getElementById('description').value = t.desc;
            document.getElementById('amount').value = t.amount;
            document.getElementById('type').value = t.type;
            editIndex = i;
            document.getElementById('l_addBtn').innerText = (currentLang === 'ar' ? "تحديث الآن" : "Update Now");
            window.scrollTo(0,0);
        }

        function deleteItem(i) {
            if(confirm(currentLang === 'ar' ? "عايز تمسح العملية دي؟" : "Delete this?")) {
                transactions.splice(i, 1);
                updateUI();
            }
        }

        function updateUI() {
            const body = document.getElementById('tableBody'); body.innerHTML = "";
            let balance = 0, incSum = 0, expSum = 0;
            transactions.forEach((t, i) => {
                const amt = parseFloat(t.amount);
                if (t.type === 'income') { balance += amt; incSum += amt; }
                else { balance -= amt; expSum += amt; }
                body.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td style="font-size:10px; opacity:0.6">${t.date}</td>
                        <td><b>${t.desc}</b></td>
                        <td style="color:${t.type==='income'?'var(--success)':'var(--danger)'}; font-weight:bold;">${amt}</td>
                        <td class="no-print">
                            <button onclick="editItem(${i})" style="background:none; border:none; cursor:pointer;">📝</button>
                            <button onclick="deleteItem(${i})" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
                        </td>
                    </tr>
                `);
            });
            document.getElementById('liveBalance').innerText = balance.toFixed(2);
            document.getElementById('totalIncome').innerText = incSum.toFixed(2);
            document.getElementById('totalExpenses').innerText = expSum.toFixed(2);
            localStorage.setItem('rahim_final_db', JSON.stringify(transactions));
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function emergencyReset() { if(confirm("تحذير: هتمسح كل حاجة وهترجع الباسورد 1234. موافق؟")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            document.body.className = currentTheme;
            document.getElementById('themeSelect').value = currentTheme;
            document.getElementById('langSelect').value = currentLang;
            applyLanguage();
        };
   const quotes = [
    "✨ نصيحة اليوم: وفر 10% من مصروفك وهتشوف الفرق!",
    "🚀 يا صديقي، المحاسب الشاطر هو اللي عينه على الصافي دايماً.",
    "💰 تذكر: القرش الأبيض ينفع في اليوم الأسود!",
    "🏆 استمر.. تنظيمك لفلوسك هو أول خطوة للنجاح.",
    "🌟 فكر مرتين قبل ما تشتري حاجة مش محتاجها دلوقتي."
];
document.getElementById('quoteArea').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        
    </script>
</body>
</html>
